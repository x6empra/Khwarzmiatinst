{% extends "base.html" %}
{% block title %}تسجيل الخروج — خوارزميات{% endblock %}
{% block description %}تأكيد تسجيل الخروج من حسابك في خوارزميات.{% endblock %}
{% block content %}
  <section class="surface-band py-20">
    <div class="container mx-auto px-4">
      <div class="mx-auto max-w-lg rounded-lg border border-primary/10 bg-white p-8 text-center shadow-sm">
        <h1 class="text-3xl font-black text-primary">تسجيل الخروج</h1>
        <p class="mt-4 text-neutral-700">هل تريد تسجيل الخروج من حسابك؟</p>
        <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
          <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn-primary w-full sm:w-auto">تسجيل الخروج</button>
          </form>
          <a href="{% url 'landing:home' %}" class="btn-ghost text-center">البقاء في الموقع</a>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
