{% extends "base.html" %}
{% block title %}تسجيل مستثمر جديد — خوارزميات{% endblock %}
{% block content %}
  <section class="mx-auto max-w-lg py-12">
    <div class="rounded-lg border border-primary/10 bg-white/70 p-2 shadow-lg backdrop-blur">
      <div class="card interactive-card">
        <header class="mb-6 text-center">
          <p class="section-eyebrow">ابدأ الاشتراك</p>
          <h1 class="mt-3 text-2xl font-black text-primary">إنشاء حساب مستثمر</h1>
          <p class="mt-2 text-sm text-neutral-700">سجّل لتقديم طلب الاشتراك ومتابعته من ملفك الشخصي.</p>
        </header>
        <form method="post" novalidate>
          {% csrf_token %}
          {% include "account/_form.html" %}
          <button type="submit" class="btn-primary w-full">إنشاء الحساب</button>
        </form>
        <p class="mt-6 text-center text-sm text-neutral-700">
          لديك حساب بالفعل؟
          <a href="{% url 'accounts:login' %}"
             class="font-bold text-accent hover:text-accent-dark">سجّل دخول</a>
        </p>
      </div>
    </div>
  </section>
{% endblock %}
