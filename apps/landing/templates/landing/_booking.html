{# Booking CTA — يستخدم F3 _form.html #}
<section id="booking"
         class="border-y border-primary/30 bg-primary py-20 text-white shadow-inner"
         aria-labelledby="booking-title">
  <div class="container mx-auto max-w-xl px-4">
    <header class="mb-10 text-center">
      <p class="inline-flex rounded-full border border-accent/40 bg-accent/15 px-4 py-1 text-sm font-bold text-accent">
        ابدأ الآن
      </p>
      <h2 id="booking-title" class="mt-2 text-3xl font-black md:text-4xl">احجز استشارتك المجانية</h2>
      <p class="mt-3 text-base text-white/80">املأ بياناتك وسيتواصل معك فريقنا خلال 24 ساعة لاقتراح الباقة المناسبة.</p>
    </header>
    <div class="rounded-lg border border-accent/25 bg-white/95 p-6 text-neutral-900 shadow-xl ring-1 ring-white/20 sm:p-8">
      <div id="booking-form-container">{% include "leads/_form.html" with form=lead_form %}</div>
    </div>
    <p class="mt-6 text-center text-xs text-white/70">
      🔒 بياناتك محمية بـ HTTPS و reCAPTCHA. لن نشارك معلوماتك مع أي طرف ثالث.
    </p>
  </div>
</section>
