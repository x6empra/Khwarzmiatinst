      <p class="text-sm font-bold text-accent">ابدأ الآن</p>

      <div id="booking-form-container">

    <p class="mt-6 text-center text-xs text-white/70">
      🔒 بياناتك محمية بـ HTTPS و reCAPTCHA. لن نشارك معلوماتك مع أي طرف ثالث.
