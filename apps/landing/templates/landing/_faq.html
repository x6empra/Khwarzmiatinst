{# FAQ — Schema.org FAQPage (يُولَّد JSON-LD مرة في index.html) #}
<section id="faq" class="py-20" aria-labelledby="faq-title">
  <div class="container mx-auto max-w-3xl px-4">
    <header class="mb-10 text-center">
      <p class="section-eyebrow">الأسئلة الشائعة</p>
      <h2 id="faq-title"
          class="mt-2 text-3xl font-black text-primary md:text-4xl">إجابات سريعة لأهم استفساراتك</h2>
    </header>
    <div class="space-y-3">
      {% for faq in faqs %}
        <details class="group card interactive-card cursor-pointer"
                 {% if forloop.first %}open{% endif %}>
          <summary class="flex items-center justify-between gap-3 list-none">
            <h3 class="text-base font-bold text-primary">{{ faq.q }}</h3>
            <span class="grid size-8 place-items-center rounded-full bg-accent/15 text-accent transition group-open:rotate-180"
                  aria-hidden="true">⌄</span>
          </summary>
          <p class="mt-3 text-sm text-neutral-700 leading-relaxed">{{ faq.a }}</p>
        </details>
      {% endfor %}
    </div>
  </div>
</section>
