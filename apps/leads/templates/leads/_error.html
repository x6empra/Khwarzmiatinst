{# Error Toast — DESIGN_GUIDE.md §States.Error #}
<div class="rounded-md bg-red-50 border border-red-200 p-4 text-sm text-red-700" role="alert">
  <div class="flex items-start gap-3">
    <span class="text-2xl" aria-hidden="true">⚠️</span>
    <div class="grow">
      <strong class="block font-bold">حدث خطأ</strong>
      <p>{{ message }}</p>
    </div>
  </div>
  <button
    type="button"
    class="mt-3 text-sm font-bold text-accent hover:text-accent-dark"
    hx-get="{% url 'leads:create' %}"
    hx-target="#booking-form-container"
    hx-swap="innerHTML"
  >
    أعد المحاولة
  </button>
</div>
